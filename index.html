<!DOCTYPE html>

<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Zulhilmi & Athilah</title>

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Poppins:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <section class="hero">
      <div class="overlay">
        <p class="small-title">Walimatul Urus</p>

        <h1>
          Muhammad Zulhilmi
          <br />
          &
          <br />
          Nor Athilah Syafiqah
        </h1>

        <p class="date">06 September 2026</p>

        <button id="openInvitation">Buka Jemputan</button>
      </div>
    </section>

    <section class="content">
      <div class="section">
        <h2>Assalamualaikum</h2>

        <p>
          Dengan penuh kesyukuran ke hadrat Allah SWT, kami menjemput
          Dato'/Datin/Tuan/Puan/ Encik/Cik ke majlis perkahwinan kami.
        </p>
      </div>

      <div class="section">
        <h2>Countdown</h2>

        <div id="countdown"></div>
      </div>

      <div class="section">
        <h2>Lokasi Majlis</h2>

        <p>Mama Catering Event Hall</p>

        <a class="btn-map" href="#" target="_blank"> Google Maps </a>

        <a class="btn-map" href="#" target="_blank"> Waze </a>
      </div>

      <div class="section">
        <h2>RSVP</h2>

        <form id="rsvpForm">
          <input type="text" id="nama" placeholder="Nama Tetamu" required />

          <input type="number" id="pax" placeholder="Bilangan Hadir" required />

          <button type="submit">Hantar RSVP</button>
        </form>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
